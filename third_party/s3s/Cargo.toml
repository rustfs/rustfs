[package]
name = "s3s"
version = "0.14.0-dev"
description = "S3 Service Adapter"
readme = "../../README.md"
keywords = ["s3"]
categories = ["web-programming", "web-programming::http-server"]
edition = "2024"
repository = "https://github.com/Nugine/s3s"
license = "Apache-2.0"
rust-version = "1.92.0"

[workspace]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
openssl = ["dep:openssl"]
minio = []

[target.'cfg(not(windows))'.dependencies]
openssl = { version = "0.10.75", optional = true }

[dependencies]
arc-swap = "1.8.2"
arrayvec = "0.7.6"
async-trait = "0.1.89"
atoi = { version = "2.0.0", default-features = false }
base64-simd = "0.8.0"
bytes = "1.11.1"
bytestring = "1.5.0"
cfg-if = "1.0.4"
chrono = { version = "0.4.44", default-features = false }
crc-fast = "1.9.0"
futures = { version = "0.3.32", default-features = false, features = ["std"] }
hex-simd = "0.8.0"
hmac = "=0.13.0-rc.5"
http = "1.4.0"
http-body = "1.0.1"
http-body-util = "0.1.3"
httparse = "1.10.1"
hyper = { version = "1.8.1", features = ["http1", "http2", "server"] }
itoa = "1.0.17"
md-5 = "=0.11.0-rc.5"
memchr = "2.8.0"
mime = "0.3.17"
nom = "8.0.0"
numeric_cast = "0.3.0"
pin-project-lite = "0.2.17"
quick-xml = { version = "0.37.5", features = ["serialize"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_urlencoded = "0.7.1"
sha1 = "=0.11.0-rc.5"
sha2 = "=0.11.0-rc.5"
smallvec = "1.15.1"
std-next = "0.1.9"
subtle = "2.6.1"
sync_wrapper = { version = "1.0.2", default-features = false }
thiserror = "2.0.18"
time = { version = "0.3.47", features = ["formatting", "parsing", "macros"] }
tokio = { version = "1.50.0", features = ["time"] }
tower = { version = "0.5.3", default-features = false }
tracing = "0.1.44"
transform-stream = "0.3.1"
url = "2.5.8"
urlencoding = "2.1.3"
zeroize = "1.8.2"

[dev-dependencies]
axum = "0.8.8"
clap = { version = "4.6.0", features = ["derive", "env"] }
hyper-util = { version = "0.1.20", features = ["server-auto", "server-graceful", "http1", "http2", "tokio"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
tokio-rustls = { version = "0.26.4", default-features = false, features = ["logging", "tls12", "aws-lc-rs"] }
tokio-util = { version = "0.7.18", features = ["io"] }
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "time"] }
