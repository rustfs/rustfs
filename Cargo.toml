[workspace]
members = [
    "rustfs", # Core file system implementation
    "crates/appauth", # Application authentication and authorization
    "crates/audit", # Audit target management system with multi-target fan-out
    "crates/checksums", # client checksums
    "crates/common", # Shared utilities and data structures
    "crates/config", # Configuration management
    "crates/credentials", # Credential management system
    "crates/crypto", # Cryptography and security features
    "crates/ecstore", # Erasure coding storage implementation
    "crates/e2e_test", # End-to-end test suite
    "crates/filemeta", # File metadata management
    "crates/heal", # Erasure set and object healing
    "crates/iam", # Identity and Access Management
    "crates/keystone", # OpenStack Keystone integration
    "crates/kms", # Key Management Service
    "crates/lock", # Distributed locking implementation
    "crates/madmin", # Management dashboard and admin API interface
    "crates/notify", # Notification system for events
    "crates/obs", # Observability utilities
    "crates/object-capacity", # Capacity scan and refresh core
    "crates/policy", # Policy management
    "crates/protocols", # Protocol implementations (FTPS, SFTP, etc.)
    "crates/protos", # Protocol buffer definitions
    "crates/rio", # Rust I/O utilities and abstractions
    "crates/concurrency", # Concurrency management for RustFS - timeout, locking, backpressure, and I/O scheduling
    "crates/s3-common", # Common utilities and data structures for S3 compatibility
    "crates/s3select-api", # S3 Select API interface
    "crates/s3select-query", # S3 Select query engine
    "crates/scanner", # Scanner for data integrity checks and health monitoring
    "crates/signer", # client signer
    "crates/targets", # Target-specific configurations and utilities
    "crates/trusted-proxies", # Trusted proxies management
    "crates/utils", # Utility functions and helpers
    "crates/workers", # Worker thread pools and task scheduling
    "crates/io-metrics", # Zero-copy metrics collection for performance analysis
    "crates/io-core", # Zero-copy core reader and writer implementations
    "crates/zip", # ZIP file handling and compression
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/rustfs/rustfs"
rust-version = "1.95.0"
version = "1.0.0-beta.2"
homepage = "https://rustfs.com"
description = "RustFS is a high-performance distributed object storage software built using Rust, one of the most popular languages worldwide. "
keywords = ["RustFS", "Minio", "object-storage", "filesystem", "s3"]
categories = ["web-programming", "development-tools", "filesystem", "network-programming"]
authors = ["RustFS Team"]

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = "warn"
needless_collect = "warn"
redundant_clone = "warn"

[workspace.dependencies]
# RustFS Internal Crates
rustfs = { path = "./rustfs", version = "1.0.0-beta.2" }
rustfs-heal = { path = "crates/heal", version = "1.0.0-beta.2" }
rustfs-appauth = { path = "crates/appauth", version = "1.0.0-beta.2" }
rustfs-audit = { path = "crates/audit", version = "1.0.0-beta.2" }
rustfs-checksums = { path = "crates/checksums", version = "1.0.0-beta.2" }
rustfs-common = { path = "crates/common", version = "1.0.0-beta.2" }
rustfs-config = { path = "./crates/config", version = "1.0.0-beta.2" }
rustfs-concurrency = { path = "./crates/concurrency", version = "1.0.0-beta.2" }
rustfs-credentials = { path = "crates/credentials", version = "1.0.0-beta.2" }
rustfs-crypto = { path = "crates/crypto", version = "1.0.0-beta.2" }
rustfs-ecstore = { path = "crates/ecstore", version = "1.0.0-beta.2" }
rustfs-filemeta = { path = "crates/filemeta", version = "1.0.0-beta.2" }
rustfs-iam = { path = "crates/iam", version = "1.0.0-beta.2" }
rustfs-keystone = { path = "crates/keystone", version = "1.0.0-beta.2" }
rustfs-kms = { path = "crates/kms", version = "1.0.0-beta.2" }
rustfs-lock = { path = "crates/lock", version = "1.0.0-beta.2" }
rustfs-madmin = { path = "crates/madmin", version = "1.0.0-beta.2" }
rustfs-notify = { path = "crates/notify", version = "1.0.0-beta.2" }
rustfs-io-metrics = { path = "crates/io-metrics", version = "1.0.0-beta.2" }
rustfs-io-core = { path = "crates/io-core", version = "1.0.0-beta.2" }
rustfs-object-capacity = { path = "crates/object-capacity", version = "1.0.0-beta.2" }
rustfs-obs = { path = "crates/obs", version = "1.0.0-beta.2" }
rustfs-policy = { path = "crates/policy", version = "1.0.0-beta.2" }
rustfs-protos = { path = "crates/protos", version = "1.0.0-beta.2" }
rustfs-protocols = { path = "crates/protocols", version = "1.0.0-beta.2" }
rustfs-rio = { path = "crates/rio", version = "1.0.0-beta.2" }
rustfs-s3-common = { path = "crates/s3-common", version = "1.0.0-beta.2" }
rustfs-s3select-api = { path = "crates/s3select-api", version = "1.0.0-beta.2" }
rustfs-s3select-query = { path = "crates/s3select-query", version = "1.0.0-beta.2" }
rustfs-scanner = { path = "crates/scanner", version = "1.0.0-beta.2" }
rustfs-signer = { path = "crates/signer", version = "1.0.0-beta.2" }
rustfs-trusted-proxies = { path = "crates/trusted-proxies", version = "1.0.0-beta.2" }
rustfs-targets = { path = "crates/targets", version = "1.0.0-beta.2" }
rustfs-utils = { path = "crates/utils", version = "1.0.0-beta.2" }
rustfs-workers = { path = "crates/workers", version = "1.0.0-beta.2" }
rustfs-zip = { path = "./crates/zip", version = "1.0.0-beta.2" }

# Async Runtime and Networking
async-channel = "2.5.0"
mysql_async = { version = "0.36.1", default-features = false, features = ["default-rustls", "tracing"], git = "https://github.com/blackbeam/mysql_async", rev = "98d3d8067efdf97d3e93cdca7b9231753c904aca" }
async-compression = { version = "0.4.42" }
async-recursion = "1.1.1"
async-trait = "0.1.89"
async-nats = "0.48.0"
axum = "0.8.9"
futures = "0.3.32"
futures-core = "0.3.32"
futures-util = "0.3.32"
pollster = "0.4.0"
pulsar = { version = "6.7.2", default-features = false, features = ["tokio-rustls-runtime"] }
lapin = { version = "4.7.1", default-features = false, features = ["tokio", "rustls", "rustls--aws_lc_rs"] }
hyper = { version = "1.9.0", features = ["http2", "http1", "server"] }
hyper-rustls = { version = "0.27.9", default-features = false, features = ["native-tokio", "http1", "tls12", "logging", "http2", "aws-lc-rs", "webpki-roots"] }
hyper-util = { version = "0.1.20", features = ["tokio", "server-auto", "server-graceful", "tracing"] }
http = "1.4.0"
http-body = "1.0.1"
http-body-util = "0.1.3"
reqwest = { version = "0.13.3", default-features = false, features = ["rustls", "charset", "http2", "system-proxy", "stream", "json", "blocking", "query", "form"] }
rustfs-kafka-async = { version = "1.2.0" }
socket2 = { version = "0.6.3", features = ["all"] }
tokio = { version = "1.52.2", features = ["fs", "rt-multi-thread"] }
tokio-rustls = { version = "0.26.4", default-features = false, features = ["logging", "tls12", "aws-lc-rs"] }
tokio-stream = { version = "0.1.18" }
tokio-test = "0.4.5"
tokio-util = { version = "0.7.18", features = ["io", "compat"] }
tonic = { version = "0.14.6", features = ["gzip"] }
tonic-prost = { version = "0.14.6" }
tonic-prost-build = { version = "0.14.6" }
tower = { version = "0.5.3", features = ["timeout"] }
tower-http = { version = "0.6.10", features = ["cors"] }

# Serialization and Data Formats
bytes = { version = "1.11.1", features = ["serde"] }
bytesize = "2.3.1"
byteorder = "1.5.0"
flatbuffers = "25.12.19"
form_urlencoded = "1.2.2"
prost = "0.14.3"
quick-xml = "0.39.3"
rmp = { version = "0.8.15" }
rmp-serde = { version = "1.3.1" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["raw_value"] }
serde_urlencoded = "0.7.1"

# Cryptography and Security
aes-gcm = { version = "0.11.0-rc.3", features = ["rand_core"] }
argon2 = { version = "0.6.0-rc.8" }
blake2 = "0.11.0-rc.6"
chacha20poly1305 = { version = "0.11.0-rc.3" }
crc-fast = "1.9.0"
hmac = { version = "0.13.0" }
jsonwebtoken = { version = "10.3.0", features = ["aws_lc_rs"] }
openidconnect = { version = "4.0", default-features = false }
pbkdf2 = "0.13.0"
rsa = { version = "0.10.0-rc.18" }
rustls = { version = "0.23.40", default-features = false, features = ["aws-lc-rs", "logging", "tls12", "prefer-post-quantum", "std"] }
rustls-native-certs = "0.8"
rustls-pki-types = "1.14.1"
sha1 = "0.11.0"
sha2 = "0.11.0"
subtle = "2.6"
zeroize = { version = "1.8.2", features = ["derive"] }

# Time and Date
chrono = { version = "0.4.44", features = ["serde"] }
humantime = "2.3.0"
jiff = { version = "0.2.24", features = ["serde"] }
time = { version = "0.3.47", features = ["std", "parsing", "formatting", "macros", "serde"] }

# Database
deadpool-postgres = { version = "0.14", features = ["rt_tokio_1"] }
tokio-postgres = { version = "0.7", default-features = false, features = ["runtime", "with-serde_json-1"] }
tokio-postgres-rustls = "0.13"

# Utilities and Tools
anyhow = "1.0.102"
arc-swap = "1.9.1"
astral-tokio-tar = "0.6.1"
atoi = "2.0.0"
atomic_enum = "0.3.0"
aws-config = { version = "1.8.16" }
aws-credential-types = { version = "1.2.14" }
aws-sdk-s3 = { version = "1.132.0", default-features = false, features = ["sigv4a", "default-https-client", "rt-tokio"] }
aws-smithy-http-client = { version = "1.1.12", default-features = false, features = ["default-client", "rustls-aws-lc"] }
