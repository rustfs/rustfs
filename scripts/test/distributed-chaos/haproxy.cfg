defaults
  mode http
  timeout connect 5s
  timeout client  300s
  timeout server  300s
  retries 3

frontend fe_s3
  bind *:9000
  default_backend be_s3

backend be_s3
  balance roundrobin
  option httpchk GET /health
  http-check expect status 200
  server s1 rustfs-node1:9000 check
  server s2 rustfs-node2:9000 check
  server s3 rustfs-node3:9000 check
  server s4 rustfs-node4:9000 check
