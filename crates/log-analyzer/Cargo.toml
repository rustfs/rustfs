[package]
name = "rustfs-log-analyzer"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true
homepage.workspace = true
description = "Offline log fault-analysis core for RustFS: parse customer logs, match failure rules, produce diagnosis reports."
keywords = ["rustfs", "logs", "diagnostics", "troubleshooting"]
categories = ["development-tools", "command-line-utilities"]
documentation = "https://docs.rs/rustfs-log-analyzer/latest/rustfs_log_analyzer/"

[lib]
doctest = false

[[bin]]
name = "la-dump-anchors"
path = "src/bin/la_dump_anchors.rs"

[dependencies]
chrono = { workspace = true }
flate2 = { workspace = true }
regex = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tar = { workspace = true }
thiserror = { workspace = true }
walkdir = { workspace = true }
zip = { workspace = true }
zstd = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
