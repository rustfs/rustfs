name: Publish helm chart to artifacthub

on:
  workflow_run:
    workflows: [ "Build and Release" ]
    types: [ completed ]

permissions:
  contents: read

jobs:
  build-helm-package:
    runs-on: ubicloud-standard-2
    # Only run on successful builds triggered by tag pushes (version format: x.y.z or x.y.z-suffix)
    if: |
      github.event.workflow_run.conclusion == 'success' && 
      github.event.workflow_run.event == 'push' &&
      contains(github.event.workflow_run.head_branch, '.')

    outputs:
      raw_tag: ${{ steps.version.outputs.raw_tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout helm chart repo
        uses: actions/checkout@v6

      - name: Normalize release version
        id: version
        run: |
          set -eux

          RAW="${{ github.event.workflow_run.head_branch }}"

          case "$RAW" in
            refs/tags/*)
              RAW_TAG="${RAW#refs/tags/}"
              ;;
            *)
              RAW_TAG="$RAW"
              ;;
          esac

          VERSION="$RAW_TAG"
          case "$VERSION" in
            v*)
              VERSION="${VERSION#v}"
              ;;
          esac

          echo "raw_tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "raw_tag=$RAW_TAG"
          echo "version=$VERSION"

      - name: Replace chart app version
        run: |
          set -eux
          sed -i -E 's/^appVersion:.*/appVersion: "${{ steps.version.outputs.version }}"/' helm/rustfs/Chart.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0

      - name: Package Helm Chart
        run: |
          cp helm/README.md helm/rustfs/
          helm package ./helm/rustfs \
            --destination helm/rustfs/ \
            --version "${{ steps.version.outputs.version }}"

      - name: Upload helm package as artifact
        uses: actions/upload-artifact@v6
        with:
          name: helm-package
          path: helm/rustfs/*.tgz
          retention-days: 1

  publish-helm-package:
    runs-on: ubicloud-standard-2
    needs: [ build-helm-package ]
    if: needs.build-helm-package.result == 'success'

    steps:
      - name: Checkout helm package repo
        uses: actions/checkout@v6
        with:
          repository: rustfs/helm
          token: ${{ secrets.RUSTFS_HELM_PACKAGE }}

      - name: Download helm package
        uses: actions/download-artifact@v7
        with:
          name: helm-package
          path: ./

      - name: Set up helm
        uses: azure/setup-helm@v4.3.0

      - name: Generate index
        run: helm repo index . --url https://charts.rustfs.com

      - name: Push helm package and index file
        run: |
          git config --global user.name "${{ secrets.USERNAME }}"
          git config --global user.email "${{ secrets.EMAIL_ADDRESS }}"
          git status .
          git add .
          git commit -m "Update rustfs helm package with ${{ needs.build-helm-package.outputs.version }}."
          git push origin main
