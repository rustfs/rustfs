name: Update Nix Flake

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sundays

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-flake:
    name: Update flake.lock
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3

      - name: Cache Nix
        uses: DeterminateSystems/flakehub-cache-action@1f9a51a2959d3e26c7838c6f3bf9f48acae525ea # v3.20.0

      - name: Check Nix flake inputs
        uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12

      - name: Update flake.lock
        id: update
        uses: DeterminateSystems/update-flake-lock@fd9359ac79d0e912f1b4b947a48470b3e2799b56 # main
        with:
          git-author-name: houseme
          git-author-email: housemecn@gmail.com
          git-committer-name: houseme
          git-committer-email: housemecn@gmail.com
          pr-title: "chore(deps): update flake.lock"
          pr-labels: |
            dependencies
            nix
            automated
          commit-msg: "chore(deps): update flake.lock"
          pr-reviewers: overtrue, majinghe
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}

      - name: Log PR details
        if: steps.update.outputs.pull-request-number
        run: |
          echo "Pull Request created: ${{ steps.update.outputs.pull-request-number }}"
